name: "Copilot Setup Steps"

# Run automatically when this file changes (validates the setup),
# and allow manual trigger from the Actions tab.
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # MUST be named 'copilot-setup-steps' — Copilot looks for this exact job name.
  copilot-setup-steps:
    runs-on: ubuntu-latest

    permissions:
      contents: read  # required for actions/checkout

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Syntax check entry point
        run: node --check src/main.js

      - name: Syntax check dashboard server
        run: node --check src/dashboard/dashboardServer.js

      - name: Syntax check dashboard state
        run: node --check src/dashboard/dashboardState.js

      - name: Syntax check paper trader
        run: node --check src/executor/paperTrader.js
