services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    image: playcryptowithais:latest
    container_name: playcrypto-bot
    restart: unless-stopped
    network_mode: host

    # ── Secrets & config ──────────────────────────────────────────────────────
    # Copy .env (your real keys) to the server alongside docker-compose.yml
    # It is NEVER committed to git.
    env_file: ./.env

    # ── Persistence ──────────────────────────────────────────────────────────
    # Bind mounts: data/ and logs/ live on the host (and in git).
    # trades.csv and dashboard_persist.json are committed to the repo so
    # trade history survives server moves and is git-tracked.
    # Candle files (~300 MB) are also committed; no named volumes needed.
    volumes:
      - ./data:/app/data     # candles, dashboard_persist.json, fearGreed, etc.
      - ./logs:/app/logs     # trades.csv (git-tracked), app.log (gitignored)

    # ── Logging ──────────────────────────────────────────────────────────────
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

