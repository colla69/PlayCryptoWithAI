# Development override — paper mode + live source sync via Docker watch.
# The base docker-compose.yml already uses bind mounts for ./data and ./logs,
# so history files are automatically shared with the host in all modes.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  bot:
    env_file: ..env             # local ..env (PAPER_MODE=true recommended)
    environment:
      - PAPER_MODE=true
    # Rebuild on source changes when using watch mode:
    # docker compose -f docker-compose.yml -f docker-compose.dev.yml watch
    develop:
      watch:
        - action: sync
          path: ./src
          target: /app/src
        - action: sync
          path: ./config
          target: /app/config
        - action: sync
          path: ./public
          target: /app/public
        - action: rebuild
          path: package.json
